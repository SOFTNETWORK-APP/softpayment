    baseUrl = "https://api.stripe.com"
    base-url = ${payment.stripe.baseUrl}
    debug = false
    # Whether the provider's webhook endpoint is a Stripe Connect endpoint. false (default) =>
    # platform-account events (customer.updated, invoice.*, subscription.*, payment_method.*);
    # true => connected-account events (account.updated, person.updated). The license-server needs
    # platform-account events, so keep this false. Changing it requires deleting the existing
    # endpoint in Stripe so it gets recreated (connect is immutable after creation).
    connected = false
    connected = ${?STRIPE_CONNECTED}
    secure-mode-path = ${payment.path}
    hooks-path = ${payment.path}
    mandate-path = ${payment.path}
    paypal-path = ${payment.path}
  }
}
